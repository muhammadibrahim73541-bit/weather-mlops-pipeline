<!DOCTYPE html>
<html>
<head>
    <title>Weather AI Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
        }

        .navbar h1 {
            font-weight: 800;
        }

        .container {
            padding: 40px;
        }

        .search {
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 250px;
        }

        button {
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .temp {
            font-size: 30px;
            font-weight: bold;
        }

        pre {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h1>🌍 Weather AI Dashboard</h1>
    <p>Next-Gen MLOps UI ⚡</p>
</div>

<div class="container">

    <!-- SEARCH -->
    <div class="search">
        <input id="cityInput" placeholder="Search city...">
        <button onclick="getWeather()">Search</button>
    </div>

    <!-- GRID -->
    <div class="grid" id="weatherGrid"></div>

    <!-- POEM -->
    <div class="card">
        <h2>📜 AI Poem</h2>
        <pre id="poem">Loading...</pre>
    </div>

    <!-- MUSIC -->
    <div class="card">
        <h2>🎵 Music</h2>
        <button onclick="playMusic()">▶ Play</button>
        <button onclick="pauseMusic()">⏸ Pause</button>
    </div>

</div>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const API_KEY = "bcd0a3981a274233fe9126263d1ea061"; // replace this

const cities = ["Aalborg", "Lahore", "Doha"];

function fetchWeather(city) {
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`)
    .then(res => res.json())
    .then(data => {
        const time = new Date().toLocaleTimeString();

        const card = `
            <div class="card">
                <h2>${data.name}</h2>
                <p class="temp">${data.main.temp}°C</p>
                <p>${data.weather[0].description}</p>
                <p>⏰ ${time}</p>
            </div>
        `;

        document.getElementById("weatherGrid").innerHTML += card;
    });
}

// Load default cities
cities.forEach(city => fetchWeather(city));

// Search city
function getWeather() {
    const city = document.getElementById("cityInput").value;
    fetchWeather(city);
}

// Music
const music = document.getElementById("music");
function playMusic() { music.play(); }
function pauseMusic() { music.pause(); }

// Poem
fetch("poem.txt")
.then(res => res.text())
.then(data => {
    document.getElementById("poem").textContent = data;
});
</script>

</body>
</html>
