<!DOCTYPE html>
<html>
<head>
    <title>Weather AI Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            font-size: 20px;
        }

        /* Layout */
        .container {
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Buttons */
        button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        pre {
            white-space: pre-wrap;
        }

        .controls {
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <h1>🌍 Weather AI</h1>
    <p>Powered by MLOps ⚡</p>
</div>

<div class="container">

    <div class="grid">

        <!-- WEATHER CARD -->
        <div class="card">
            <h2>🌤 Live Weather</h2>
            <p>Check above widget 👆</p>
        </div>

        <!-- POEM CARD -->
        <div class="card">
            <h2>📜 AI Poem</h2>
            <pre id="poem">Loading...</pre>
        </div>

        <!-- MUSIC CARD -->
        <div class="card">
            <h2>🎵 Music</h2>

            <div class="controls">
                <button onclick="playMusic()">▶ Play</button>
                <button onclick="pauseMusic()">⏸ Pause</button>
            </div>
        </div>

    </div>

</div>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const music = document.getElementById("music");

    window.playMusic = () => music.play();
    window.pauseMusic = () => music.pause();

    fetch("poem.txt")
        .then(res => res.text())
        .then(data => {
            document.getElementById("poem").textContent = data;
        })
        .catch(() => {
            document.getElementById("poem").textContent = "Error loading poem";
        });

});
</script>

</body>
</html>
